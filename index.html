<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Charger</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050a08; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    @keyframes pulse-red {
      0%,100%{ box-shadow: 0 0 0 0 rgba(255,60,60,0.2); }
      50%{     box-shadow: 0 0 0 10px rgba(255,60,60,0); }
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CHARGERS = [
      { id: "CHG-001", label: "Charger 1" },
      { id: "CHG-002", label: "Charger 2" },
      { id: "CHG-003", label: "Charger 3" },
      { id: "CHG-004", label: "Charger 4" },
    ];

    // ─── API helpers ──────────────────────────────────────────────────────────
    async function fetchState() {
      const res = await fetch("/api/state");
      return res.json();
    }

    async function updateState(id, status, userName = null) {
      const res = await fetch("/api/state", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, status, userName }),
      });
      return res.json();
    }

    async function sendSlack(message) {
      try {
        await fetch("/api/notify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
      } catch (e) { console.error("[Slack]", e); }
    }

    function formatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60).toString().padStart(2, "0");
      const s = (secs % 60).toString().padStart(2, "0");
      return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
    }

    function getElapsed(startTime) {
      if (!startTime) return 0;
      return Math.floor((Date.now() - startTime) / 1000);
    }

    function getChargerFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("charger");
    }

    // ─── Icons ────────────────────────────────────────────────────────────────
    const BoltIcon = ({ size = 20 }) => (
      <svg viewBox="0 0 24 24" fill="currentColor" width={size} height={size}>
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
      </svg>
    );
    const CheckIcon = ({ size = 18 }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width={size} height={size}>
        <polyline points="20 6 9 17 4 12" />
      </svg>
    );
    const ArrowLeft = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18">
        <path d="M19 12H5M12 19l-7-7 7-7" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );
    const UserIcon = ({ size = 16 }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width={size} height={size}>
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" strokeLinecap="round"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    );
    const AlertIcon = ({ size = 20 }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width={size} height={size}>
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" strokeLinecap="round" strokeLinejoin="round"/>
        <line x1="12" y1="9" x2="12" y2="13" strokeLinecap="round"/>
        <line x1="12" y1="17" x2="12.01" y2="17" strokeLinecap="round" strokeWidth="2.5"/>
      </svg>
    );
    const WrenchIcon = ({ size = 14 }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width={size} height={size}>
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );
    const SlackIcon = () => (
      <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12">
        <path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.521 2.522v2.52H8.834zM8.834 6.313a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.956 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.528 2.528 0 0 1-2.522 2.521h-2.522V8.834zM17.688 8.834a2.528 2.528 0 0 1-2.523 2.521 2.527 2.527 0 0 1-2.52-2.521V2.522A2.527 2.527 0 0 1 15.165 0a2.528 2.528 0 0 1 2.523 2.522v6.312zM15.165 18.956a2.528 2.528 0 0 1 2.523 2.522A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.52-2.522v-2.522h2.52zM15.165 17.688a2.527 2.527 0 0 1-2.52-2.523 2.526 2.526 0 0 1 2.52-2.52h6.313A2.527 2.527 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.523h-6.313z"/>
      </svg>
    );

    // ─── Out of Service ───────────────────────────────────────────────────────
    function OutOfServiceView({ charger, onBack }) {
      return (
        <div style={{ minHeight:"100vh", background:"radial-gradient(ellipse at 50% -10%, #1a0505 0%, #080808 65%)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono', monospace", padding:"24px", position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:"-80px", left:"50%", transform:"translateX(-50%)", width:"500px", height:"500px", borderRadius:"50%", pointerEvents:"none", background:"radial-gradient(circle, rgba(255,60,60,0.12) 0%, transparent 65%)" }} />
          <button onClick={onBack} style={{ position:"absolute", top:"20px", left:"20px", display:"flex", alignItems:"center", gap:"6px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"8px", padding:"7px 12px", cursor:"pointer", color:"rgba(255,255,255,0.45)", fontSize:"12px", fontFamily:"inherit", letterSpacing:"0.06em" }}>
            <ArrowLeft /> Dashboard
          </button>
          <div style={{ width:"100%", maxWidth:"340px", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,60,60,0.3)", borderRadius:"20px", padding:"36px 26px", backdropFilter:"blur(10px)", boxShadow:"0 0 60px rgba(255,60,60,0.1)", textAlign:"center" }}>
            <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", width:"64px", height:"64px", borderRadius:"50%", background:"rgba(255,60,60,0.1)", border:"1px solid rgba(255,60,60,0.25)", color:"#ff3c3c", marginBottom:"20px", animation:"pulse-red 2s ease-in-out infinite" }}>
              <AlertIcon size={28} />
            </div>
            <div style={{ fontSize:"10px", letterSpacing:"0.2em", color:"rgba(255,255,255,0.3)", textTransform:"uppercase", marginBottom:"6px" }}>{charger.id}</div>
            <div style={{ fontSize:"22px", fontWeight:"600", color:"rgba(255,255,255,0.88)", letterSpacing:"0.04em", marginBottom:"8px" }}>{charger.label}</div>
            <div style={{ display:"inline-flex", alignItems:"center", gap:"7px", background:"rgba(255,60,60,0.1)", border:"1px solid rgba(255,60,60,0.3)", borderRadius:"100px", padding:"5px 14px", marginBottom:"24px" }}>
              <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:"#ff3c3c", boxShadow:"0 0 7px #ff3c3c", animation:"blink 1.4s ease-in-out infinite" }} />
              <span style={{ fontSize:"11px", letterSpacing:"0.12em", fontWeight:"600", textTransform:"uppercase", color:"#ff3c3c" }}>Out of Service</span>
            </div>
            <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.4)", lineHeight:"1.7", marginBottom:"8px" }}>This charger is currently unavailable due to a fault.</div>
            <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.25)", lineHeight:"1.6" }}>Please use another charger or contact your office admin.</div>
          </div>
        </div>
      );
    }

    // ─── Name Entry ───────────────────────────────────────────────────────────
    function NameEntry({ charger, onConfirm }) {
      const [name, setName] = useState("");
      return (
        <div style={{ minHeight:"100vh", background:"radial-gradient(ellipse at 40% -10%, #001a10 0%, #050b0a 65%)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono', monospace", padding:"24px", position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:"-80px", left:"50%", transform:"translateX(-50%)", width:"500px", height:"500px", borderRadius:"50%", pointerEvents:"none", background:"radial-gradient(circle, rgba(0,210,120,0.08) 0%, transparent 65%)" }} />
          <div style={{ width:"100%", maxWidth:"340px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(0,210,120,0.15)", borderRadius:"20px", padding:"32px 26px", backdropFilter:"blur(10px)", boxShadow:"0 0 50px rgba(0,210,120,0.07)" }}>
            <div style={{ marginBottom:"28px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"4px" }}>
                <span style={{ color:"#00d278" }}><BoltIcon size={24} /></span>
                <span style={{ fontSize:"10px", letterSpacing:"0.2em", color:"rgba(255,255,255,0.3)", textTransform:"uppercase" }}>EV Charger</span>
              </div>
              <div style={{ fontSize:"22px", fontWeight:"600", color:"rgba(255,255,255,0.88)", letterSpacing:"0.04em" }}>{charger.label}</div>
              <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", marginTop:"2px" }}>{charger.id}</div>
            </div>
            <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.55)", marginBottom:"16px", lineHeight:"1.5" }}>Enter your name to start charging</div>
            <div style={{ display:"flex", alignItems:"center", gap:"10px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(0,210,120,0.2)", borderRadius:"12px", padding:"12px 14px", marginBottom:"16px" }}>
              <span style={{ color:"rgba(0,210,120,0.6)", flexShrink:0 }}><UserIcon /></span>
              <input autoFocus value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && name.trim() && onConfirm(name.trim())} placeholder="Your name..."
                style={{ background:"none", border:"none", outline:"none", color:"rgba(255,255,255,0.85)", fontSize:"14px", fontFamily:"inherit", width:"100%", letterSpacing:"0.04em" }} />
            </div>
            <button onClick={() => name.trim() && onConfirm(name.trim())} disabled={!name.trim()} style={{ width:"100%", padding:"14px", borderRadius:"12px", border:"none", cursor:name.trim()?"pointer":"not-allowed", fontSize:"13px", fontFamily:"inherit", fontWeight:"600", letterSpacing:"0.12em", textTransform:"uppercase", background:name.trim()?"linear-gradient(135deg, #00d278, #00a85f)":"rgba(255,255,255,0.07)", color:name.trim()?"#001a0d":"rgba(255,255,255,0.2)", boxShadow:name.trim()?"0 4px 22px rgba(0,210,120,0.26)":"none", transition:"all 0.25s ease", display:"flex", alignItems:"center", justifyContent:"center", gap:"7px" }}>
              <BoltIcon size={15} /> Start Charging
            </button>
          </div>
        </div>
      );
    }

    // ─── Charging View ────────────────────────────────────────────────────────
    function ChargerView({ charger, state, onDone, onBack }) {
      const [elapsed, setElapsed] = useState(getElapsed(state?.startTime || 0));
      const [animating, setAnimating] = useState(false);

      useEffect(() => {
        const interval = setInterval(() => setElapsed(getElapsed(state?.startTime || 0)), 1000);
        return () => clearInterval(interval);
      }, [state?.startTime]);

      const handleDone = () => { setAnimating(true); setTimeout(() => setAnimating(false), 500); onDone(); };

      return (
        <div style={{ minHeight:"100vh", background:"radial-gradient(ellipse at 60% -10%, #1c1500 0%, #080808 65%)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono', monospace", padding:"24px", position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", top:"-80px", left:"50%", transform:"translateX(-50%)", width:"500px", height:"500px", borderRadius:"50%", pointerEvents:"none", background:"radial-gradient(circle, rgba(255,175,0,0.13) 0%, transparent 65%)" }} />
          <button onClick={onBack} style={{ position:"absolute", top:"20px", left:"20px", display:"flex", alignItems:"center", gap:"6px", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"8px", padding:"7px 12px", cursor:"pointer", color:"rgba(255,255,255,0.45)", fontSize:"12px", fontFamily:"inherit", letterSpacing:"0.06em" }}>
            <ArrowLeft /> Dashboard
          </button>
          <div style={{ width:"100%", maxWidth:"340px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,175,0,0.22)", borderRadius:"20px", padding:"32px 26px", backdropFilter:"blur(10px)", boxShadow:"0 0 50px rgba(255,175,0,0.1)" }}>
            <div style={{ marginBottom:"22px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"4px" }}>
                <span style={{ color:"#ffaf00" }}><BoltIcon size={26} /></span>
                <span style={{ fontSize:"10px", letterSpacing:"0.2em", color:"rgba(255,255,255,0.3)", textTransform:"uppercase" }}>EV Charger</span>
              </div>
              <div style={{ fontSize:"24px", fontWeight:"600", color:"rgba(255,255,255,0.88)", letterSpacing:"0.05em" }}>{charger.label}</div>
              <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.2)", marginTop:"2px" }}>{charger.id}</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:"8px", background:"rgba(255,175,0,0.07)", border:"1px solid rgba(255,175,0,0.15)", borderRadius:"10px", padding:"9px 13px", marginBottom:"20px" }}>
              <span style={{ color:"rgba(255,175,0,0.7)" }}><UserIcon /></span>
              <span style={{ fontSize:"13px", color:"rgba(255,255,255,0.75)", letterSpacing:"0.04em" }}>{state.userName}</span>
            </div>
            <div style={{ display:"inline-flex", alignItems:"center", gap:"7px", background:"rgba(255,175,0,0.1)", border:"1px solid rgba(255,175,0,0.28)", borderRadius:"100px", padding:"5px 13px", marginBottom:"24px" }}>
              <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:"#ffaf00", boxShadow:"0 0 7px #ffaf00", animation:"blink 1.4s ease-in-out infinite" }} />
              <span style={{ fontSize:"11px", letterSpacing:"0.12em", fontWeight:"600", textTransform:"uppercase", color:"#ffaf00" }}>Occupied</span>
            </div>
            <div style={{ textAlign:"center", marginBottom:"24px", padding:"14px", background:"rgba(255,175,0,0.05)", borderRadius:"12px", border:"1px solid rgba(255,175,0,0.1)" }}>
              <div style={{ fontSize:"10px", color:"rgba(255,255,255,0.28)", letterSpacing:"0.18em", marginBottom:"3px" }}>CHARGING TIME</div>
              <div style={{ fontSize:"34px", color:"#ffaf00", letterSpacing:"0.08em", fontWeight:"300" }}>{formatTime(elapsed)}</div>
            </div>
            <button onClick={handleDone} style={{ width:"100%", padding:"15px", borderRadius:"12px", border:"none", cursor:"pointer", fontSize:"13px", fontFamily:"inherit", fontWeight:"600", letterSpacing:"0.12em", textTransform:"uppercase", background:"linear-gradient(135deg, #ffaf00, #ff8800)", color:"#1a0e00", boxShadow:"0 4px 22px rgba(255,175,0,0.32)", transform:animating?"scale(0.96)":"scale(1)", transition:"all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1)", display:"flex", alignItems:"center", justifyContent:"center", gap:"7px" }}>
              <CheckIcon size={16} /> Done Charging
            </button>
          </div>
        </div>
      );
    }

    // ─── Dashboard ────────────────────────────────────────────────────────────
    function Dashboard({ states, onSelect, onToggleFault, log }) {
      const available = CHARGERS.filter(c => states[c.id]?.status === "available").length;
      const statusColor = (status) => {
        if (status === "occupied") return { dot:"#ffaf00", border:"rgba(255,175,0,0.25)", glow:"rgba(255,175,0,0.06)" };
        if (status === "fault")    return { dot:"#ff3c3c", border:"rgba(255,60,60,0.3)",  glow:"rgba(255,60,60,0.06)"  };
        return                            { dot:"#00d278", border:"rgba(0,210,120,0.15)", glow:"rgba(0,210,120,0.04)"  };
      };
      return (
        <div style={{ minHeight:"100vh", background:"radial-gradient(ellipse at 50% -20%, #0a1a12 0%, #050a08 70%)", fontFamily:"'DM Mono', monospace", padding:"32px 20px", color:"white" }}>
          <div style={{ maxWidth:"480px", margin:"0 auto 28px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"6px" }}>
              <BoltIcon size={22} />
              <span style={{ fontSize:"10px", letterSpacing:"0.22em", color:"rgba(255,255,255,0.35)", textTransform:"uppercase" }}>Office EV Chargers</span>
            </div>
            <div style={{ fontSize:"22px", fontWeight:"600", color:"rgba(255,255,255,0.88)", letterSpacing:"0.03em" }}>Dashboard</div>
            <div style={{ display:"inline-flex", alignItems:"center", gap:"6px", marginTop:"10px", background:available>0?"rgba(0,210,120,0.09)":"rgba(255,100,80,0.09)", border:`1px solid ${available>0?"rgba(0,210,120,0.2)":"rgba(255,100,80,0.2)"}`, borderRadius:"100px", padding:"4px 12px" }}>
              <span style={{ width:"5px", height:"5px", borderRadius:"50%", background:available>0?"#00d278":"#ff6450", animation:"blink 1.4s ease-in-out infinite" }} />
              <span style={{ fontSize:"11px", letterSpacing:"0.1em", color:available>0?"#00d278":"#ff6450" }}>{available} / {CHARGERS.length} Available</span>
            </div>
          </div>

          <div style={{ maxWidth:"480px", margin:"0 auto", display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px", marginBottom:"24px" }}>
            {CHARGERS.map(charger => {
              const state = states[charger.id] || { status:"available" };
              const { status } = state;
              const colors = statusColor(status);
              const elapsed = getElapsed(state.startTime);
              return (
                <div key={charger.id} style={{ background:"rgba(255,255,255,0.04)", border:`1px solid ${colors.border}`, borderRadius:"14px", padding:"16px", backdropFilter:"blur(8px)", boxShadow:`0 0 20px ${colors.glow}`, transition:"all 0.3s ease", display:"flex", flexDirection:"column" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"10px" }}>
                    <span style={{ color:colors.dot }}>{status==="fault"?<AlertIcon size={18}/>:<BoltIcon size={18}/>}</span>
                    <span style={{ width:"7px", height:"7px", borderRadius:"50%", flexShrink:0, background:colors.dot, boxShadow:`0 0 8px ${colors.dot}`, animation:"blink 1.4s ease-in-out infinite" }} />
                  </div>
                  <div style={{ fontSize:"14px", fontWeight:"600", color:"rgba(255,255,255,0.85)", marginBottom:"2px", letterSpacing:"0.03em" }}>{charger.label}</div>
                  <div style={{ fontSize:"10px", color:"rgba(255,255,255,0.22)", letterSpacing:"0.08em", marginBottom:"10px" }}>{charger.id}</div>
                  {status==="occupied" && (
                    <div style={{ marginBottom:"10px" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"5px", marginBottom:"5px" }}>
                        <span style={{ color:"rgba(255,175,0,0.5)" }}><UserIcon size={12}/></span>
                        <span style={{ fontSize:"11px", color:"rgba(255,255,255,0.55)" }}>{state.userName}</span>
                      </div>
                      <div style={{ fontSize:"11px", color:"rgba(255,175,0,0.55)" }}>{formatTime(elapsed)}</div>
                    </div>
                  )}
                  {status==="available" && (
                    <div style={{ display:"inline-flex", alignItems:"center", gap:"5px", background:"rgba(0,210,120,0.08)", borderRadius:"6px", padding:"3px 8px", marginBottom:"10px" }}>
                      <span style={{ fontSize:"10px", letterSpacing:"0.1em", fontWeight:"600", textTransform:"uppercase", color:"#00d278" }}>Available</span>
                    </div>
                  )}
                  {status==="fault" && (
                    <div style={{ display:"inline-flex", alignItems:"center", gap:"5px", background:"rgba(255,60,60,0.1)", borderRadius:"6px", padding:"3px 8px", marginBottom:"10px" }}>
                      <span style={{ fontSize:"10px", letterSpacing:"0.1em", fontWeight:"600", textTransform:"uppercase", color:"#ff3c3c" }}>Fault</span>
                    </div>
                  )}
                  <div style={{ display:"flex", gap:"6px", marginTop:"auto" }}>
                    <button onClick={() => onSelect(charger.id)} disabled={status==="fault"} style={{ flex:1, padding:"7px 0", borderRadius:"8px", border:"none", cursor:status==="fault"?"not-allowed":"pointer", fontSize:"10px", fontFamily:"inherit", fontWeight:"600", letterSpacing:"0.1em", textTransform:"uppercase", background:status==="available"?"linear-gradient(135deg, #00d278, #00a85f)":status==="occupied"?"linear-gradient(135deg, #ffaf00, #ff8800)":"rgba(255,255,255,0.05)", color:status==="available"?"#001a0d":status==="occupied"?"#1a0e00":"rgba(255,255,255,0.2)", transition:"all 0.2s ease" }}>{status==="occupied"?"View ▶":"Use"}</button>
                    <button onClick={() => onToggleFault(charger.id)} disabled={status==="occupied"} title={status==="fault"?"Mark as fixed":"Mark as fault"} style={{ padding:"7px 10px", borderRadius:"8px", border:`1px solid ${status==="fault"?"rgba(255,60,60,0.4)":"rgba(255,255,255,0.1)"}`, cursor:status==="occupied"?"not-allowed":"pointer", background:status==="fault"?"rgba(255,60,60,0.12)":"rgba(255,255,255,0.04)", color:status==="fault"?"#ff3c3c":"rgba(255,255,255,0.3)", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s ease", opacity:status==="occupied"?0.3:1 }}>
                      <WrenchIcon size={13}/>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>

          {log.length > 0 && (
            <div style={{ maxWidth:"480px", margin:"0 auto" }}>
              <div style={{ fontSize:"10px", letterSpacing:"0.18em", color:"rgba(255,255,255,0.2)", textTransform:"uppercase", marginBottom:"8px" }}>Recent Activity</div>
              {log.map((entry, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:"8px", padding:"7px 11px", marginBottom:"4px", background:"rgba(255,255,255,0.025)", borderRadius:"8px", border:"1px solid rgba(255,255,255,0.05)", opacity:1-i*0.16 }}>
                  <SlackIcon />
                  <span style={{ fontSize:"11px", color:"rgba(255,255,255,0.45)", flex:1 }}>{entry.msg}</span>
                  <span style={{ fontSize:"10px", color:"rgba(255,255,255,0.18)", whiteSpace:"nowrap" }}>{entry.time}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Root ─────────────────────────────────────────────────────────────────
    function App() {
      const urlChargerId = getChargerFromURL();
      const [view, setView] = useState("loading");
      const [states, setStates] = useState({});
      const [log, setLog] = useState([]);

      // Initial load — run once on mount
      useEffect(() => {
        async function initialLoad() {
          try {
            const data = await fetchState();
            setStates(data);
            if (urlChargerId && CHARGERS.find(c => c.id === urlChargerId)) {
              const status = data[urlChargerId]?.status;
              if (status === "fault")          setView({ type:"fault",    chargerId:urlChargerId });
              else if (status === "occupied")  setView({ type:"charging", chargerId:urlChargerId });
              else                             setView({ type:"name",     chargerId:urlChargerId });
            } else {
              setView("dashboard");
            }
          } catch (e) { console.error(e); }
        }
        initialLoad();
      }, []);

      // Poll state every 5 seconds — only update data, never change view
      useEffect(() => {
        const interval = setInterval(async () => {
          try {
            const data = await fetchState();
            setStates(data);
          } catch (e) { console.error(e); }
        }, 5000);
        return () => clearInterval(interval);
      }, []);

      const addLog = (msg) => setLog(prev => [{ msg, time: new Date().toLocaleTimeString() }, ...prev.slice(0, 6)]);

      const handleSelectCharger = (id) => {
        const status = states[id]?.status;
        if (status === "fault")          setView({ type:"fault",    chargerId:id });
        else if (status === "available") setView({ type:"name",     chargerId:id });
        else                             setView({ type:"charging", chargerId:id });
      };

      const handleToggleFault = async (id) => {
        const label = CHARGERS.find(c => c.id === id)?.label;
        const current = states[id]?.status;
        if (current === "occupied") return;
        const newStatus = current === "fault" ? "available" : "fault";
        const newStates = await updateState(id, newStatus);
        setStates(newStates);
        if (newStatus === "fault") {
          await sendSlack(`🚨 *${label}* (${id}) reported as faulty — Status: ⛔ Out of Service`);
          addLog(`${label} fault reported · Slack notified`);
        } else {
          await sendSlack(`🔧 *${label}* (${id}) fault resolved — Status: 🟢 Available`);
          addLog(`${label} fault resolved · Slack notified`);
        }
      };

      const handleNameConfirm = async (id, name) => {
        const label = CHARGERS.find(c => c.id === id)?.label;
        const newStates = await updateState(id, "occupied", name);
        setStates(newStates);
        setView({ type:"charging", chargerId:id });
        await sendSlack(`⚡ *${name}* started charging at *${label}* (${id}). Status: 🔴 Occupied`);
        addLog(`${name} · ${label} started · Slack notified`);
      };

      const handleDone = async (id) => {
        const label = CHARGERS.find(c => c.id === id)?.label;
        const { startTime, userName } = states[id];
        const duration = formatTime(getElapsed(startTime));
        const newStates = await updateState(id, "available");
        setStates(newStates);
        setView("dashboard");
        await sendSlack(`✅ *${userName}* finished charging at *${label}* (${id}) after ${duration}. Status: 🟢 Available`);
        addLog(`${userName} · ${label} freed (${duration}) · Slack notified`);
      };

      if (view === "loading") {
        return (
          <div style={{ minHeight:"100vh", background:"#050a08", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono', monospace", color:"rgba(255,255,255,0.3)", fontSize:"13px", letterSpacing:"0.1em" }}>
            Loading...
          </div>
        );
      }

      if (view === "dashboard") {
        return <Dashboard states={states} onSelect={handleSelectCharger} onToggleFault={handleToggleFault} log={log} />;
      }

      const charger = CHARGERS.find(c => c.id === view.chargerId);
      if (view.type === "fault")    return <OutOfServiceView charger={charger} onBack={() => setView("dashboard")} />;
      if (view.type === "name")     return <NameEntry charger={charger} onConfirm={(name) => handleNameConfirm(view.chargerId, name)} />;
      return <ChargerView charger={charger} state={states[view.chargerId]} onDone={() => handleDone(view.chargerId)} onBack={() => setView("dashboard")} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
